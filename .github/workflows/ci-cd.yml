name: CI-CD

on:
  push:
    branches:
      - main

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push producer image
        uses: docker/build-push-action@v5
        with:
          context: ./producer
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/producer:latest

      - name: Build and push fraud-service image
        uses: docker/build-push-action@v5
        with:
          context: ./consumers/fraud-service
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/fraud-service:latest

      - name: Build and push payment-service image
        uses: docker/build-push-action@v5
        with:
          context: ./consumers/payment-service
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/payment-service:latest

      - name: Build and push analytics-service image
        uses: docker/build-push-action@v5
        with:
          context: ./consumers/analytics-service
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/analytics-service:latest

  terraform:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Show Terraform version
        run: terraform --version
